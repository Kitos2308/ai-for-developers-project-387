services:
  - type: web
    name: backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString

  - type: web
    name: frontend
    env: docker
    rootDir: frontend
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://backend.onrender.com
      - key: VITE_LOG_API_REQUESTS
        value: "false"

databases:
  - name: postgres
    databaseName: minical